<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>项目下载已关闭 - 农村跑腿</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-green-100 flex items-center justify-center p-4">

        <div class="grid md:grid-cols-2 gap-4 text-left mb-8">

                <ul class="text-sm text-slate-700 space-y-2 list-disc pl-5">
                    <li>客户端：`login.html`</li>
                    <li>管理台：`admin-panel.html`</li>
                    <li>后台统一入口：`admin.html`</li>
                </ul>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="login.html" class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-6 py-3 text-white font-semibold hover:bg-emerald-700 transition">前往客户端登录</a>
            <a href="admin-panel.html" class="inline-flex items-center justify-center rounded-xl border border-emerald-200 px-6 py-3 text-emerald-700 font-semibold hover:bg-emerald-50 transition">前往管理控制台</a>
